; PHP Configuration for PolitiekPraat
; This file works with Apache/Nginx + PHP-FPM

; File Upload Settings
upload_max_filesize = 100M
post_max_size = 100M
max_file_uploads = 20

; Execution Time
max_execution_time = 300
max_input_time = 300

; Memory
memory_limit = 256M

; Error handling (productie: log errors, toon ze niet aan bezoekers)
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

